spec:
  id: looktube-feed-first-android-client
  version: "0.2.3"
  title: LookTube Feed-First Android Client
  description: >
    A feed-first mobile client for Giant Bomb Premium videos.
    The user pastes a copied Premium RSS feed URL, syncs it directly,
    browses the resulting library, resumes playback, receives local
    notifications when later background refreshes discover newly released
    videos, and can cast playback without browser automation.

types:
  FeedConfiguration:
    feed_url: string (required, may be blank only before setup or after explicit clearing)
  PersistedFeedConfiguration:
    feed_url: string (required)
  AccountSession:
    is_signed_in: boolean (required)
    account_label: string (optional)
    notes: string (required, user-visible status copy)
  LibrarySyncState:
    phase: string (required, Idle | Refreshing | Success | Error)
    message: string (required, user-visible)
    last_successful_sync_summary: string (optional)
  VideoSummary:
    id: string (required, non-empty)
    title: string (required, non-empty)
    description: string (required, may be empty)
    is_premium: boolean (required)
    feed_category: string (required)
    playback_url: string (optional, absolute URL)
    series_title: string (optional)
    thumbnail_url: string (optional, absolute URL)
    published_at_epoch_millis: integer (optional)
    duration_seconds: integer (optional, > 0)
  PersistedLibrarySnapshot:
    feed_url: string (required)
    videos: array of VideoSummary (required)
    last_successful_sync_summary: string (optional)
  PlaybackProgress:
    video_id: string (required)
    position_seconds: integer (required, >= 0)
    duration_seconds: integer (required, >= 0)
  ManualWatchState:
    value: string (required, Watched | Unwatched)
  VideoEngagementRecord:
    video_id: string (required)
    last_played_at_epoch_millis: integer (optional)
    completed_at_epoch_millis: integer (optional)
    manual_watch_state: ManualWatchState (optional)
  LookPointsSummary:
    total_points: integer (required, >= 0)
    watched_video_count: integer (required, >= 0)
    total_video_count: integer (required, >= 0)
    completed_show_count: integer (required, >= 0)
    total_show_count: integer (required, >= 0)
    video_points: integer (required, >= 0)
  LaunchIntent:
    open_video_id: string (optional)
    target_page: integer (optional, 0 | 1 | 2)
  NotificationRecord:
    channel_id: string (required)
    title: string (required)
    body: string (required)
    latest_video_id: string (required)
    action: string (required, opens player page with selected video)
  LibraryBrowseState:
    grouping_mode: string (required, none | show | cast | topic)
    sort_mode: string (required, latest | show | oldest)
    selected_show_filter: string (required, may be "All shows")
    show_filters_expanded: boolean (required)
    collapsed_group_keys: array of string (required, empty when grouping_mode is none)
  FeedRequest:
    feed_url: string (required, absolute URL)
    method: string (required, always GET)
    accept_header: string (required)
    user_agent: string (required)
    authorization_header: string (optional, must remain absent)
    cookie_header: string (optional, must remain absent)
  FeedParseResult:
    videos: array of VideoSummary (required)
  BackgroundRefreshRegistration:
    unique_name: string (required)
    interval_minutes: integer (required, == 15)
    flex_minutes: integer (required, == 5)
    requires_connected_network: boolean (required)
    requires_battery_not_low: boolean (required)
  PlayerPresentationState:
    selected_video_id: string (optional)
    is_fullscreen: boolean (required)
    player_ready: boolean (required)
    cast_action_visible: boolean (required)
    player_frame_pinned_top: boolean (required)
    remote_playback_active: boolean (required)
    remote_playback_label: string (optional, user-visible cast or handoff status)

contract:
  functions:
    - name: bootstrap_app
      description: Restore the saved feed configuration, cached library snapshot, playback progress, and local engagement state on app start.
      parameters:
        persisted_feed_configuration: PersistedFeedConfiguration (optional)
        persisted_library_snapshot: PersistedLibrarySnapshot (optional)
        persisted_playback_progress: array of PlaybackProgress (optional)
        persisted_video_engagement: array of VideoEngagementRecord (optional)
      returns:
        account_session: AccountSession
        feed_configuration: FeedConfiguration
        library_sync_state: LibrarySyncState
        videos: array of VideoSummary
    - name: update_feed_url
      description: Replace the saved copied feed URL and update background refresh registration state.
      parameters:
        feed_url: string (required, may be blank)
      returns:
        feed_configuration: FeedConfiguration
        library_sync_state: LibrarySyncState
    - name: sync_premium_feed
      description: Load feed-backed videos directly from the copied Premium feed URL and replace the active library on success.
      parameters:
        request: FeedRequest
      returns:
        library_sync_state: LibrarySyncState
        videos: array of VideoSummary
        persisted_library_snapshot: PersistedLibrarySnapshot
    - name: clear_synced_data
      description: Remove the cached library snapshot, playback progress, and local engagement state while keeping the saved feed URL.
      parameters: {}
      returns:
        feed_configuration: FeedConfiguration
        library_sync_state: LibrarySyncState
        videos: array of VideoSummary
    - name: select_video
      description: Select a video from the library and make it the active Player target.
      parameters:
        video_id: string (required)
      returns:
        selected_video: VideoSummary (optional)
        target_page: integer (required, 2)
    - name: handle_launch_intent
      description: Accept a launch request from the app shell or a notification tap and route the UI accordingly.
      parameters:
        intent: LaunchIntent (optional)
      returns:
        selected_video_id: string (optional)
        target_page: integer (optional)
    - name: parse_rss_feed
      description: Convert an RSS feed body into library-ready video summaries using feed-first parsing heuristics.
      parameters:
        rss_xml: string (required)
      returns: FeedParseResult
    - name: persist_playback_progress
      description: Save the active playback position for the current video so later playback can resume.
      parameters:
        video_id: string (required)
        position_seconds: integer (required, >= 0)
        duration_seconds: integer (required, >= 0)
      returns:
        playback_progress: PlaybackProgress
    - name: set_manual_watch_state
      description: Explicitly mark a video watched or unwatched for local completion tracking.
      parameters:
        video_id: string (required)
        manual_watch_state: ManualWatchState (required)
      returns:
        video_engagement: VideoEngagementRecord
  surfaces:
    - name: auth
      description: Setup and repeat-use surface for feed URL entry, sync status, sync action, and clearing synced data.
      visible_states:
        - setup required
        - ready
        - syncing
        - synced
        - needs attention
      primary_actions:
        - edit saved feed URL
        - sync Premium feed
        - clear synced data
    - name: library
      description: Browse surface for synced videos with an overview panel above the scrolling results, grouping, sorting, filtering, collapsible grouped sections, watched-state controls, show-completion visualization, rich cards, and section jumping.
      primary_actions:
        - group by none, show, cast, or topic
        - sort by latest, show, or oldest
        - expand or collapse show filters
        - expand or collapse grouped sections, or all groups at once
        - manually mark a video watched or unwatched
        - open a details dialog from truncated descriptions
        - jump to a section from the right-side jump rail
        - open a video in the player
    - name: player
      description: Playback surface for empty, unavailable, preparing, active, and remote-playback states with the player frame kept above compact supporting metadata/actions and remote indicators kept non-blocking.
      primary_actions:
        - resume playback
        - seek backward or forward by double tapping the left or right side of the player
        - toggle fullscreen from the player controls
        - cast playback
        - reopen a recently played video
        - manually mark the current video watched or unwatched
  processes:
    - name: library_refresh
      description: Periodic refresh that stays registered while a non-blank saved feed URL exists.
      inputs:
        saved_feed_url: string (required, non-empty)
        previous_snapshot: PersistedLibrarySnapshot (optional)
      outputs:
        latest_snapshot: PersistedLibrarySnapshot (optional)
        library_sync_state: LibrarySyncState
        notification: NotificationRecord (optional)
    - name: notification_delivery
      description: Create a local notification entry for a newly discovered latest video and bind the notification tap to the player route.
      inputs:
        latest_video: VideoSummary (required)
        discovered_count: integer (required, > 0)
      outputs:
        notification: NotificationRecord
  launch_contract:
    pages:
      0: auth
      1: library
      2: player
    extras:
      open_video_id: string (optional)
      target_page: integer (optional)

scenarios:
  - id: bootstrap_without_saved_feed_uses_seeded_fallback
    description: First launch without a saved feed URL keeps the app usable with seeded library content and setup-required status.
    when:
      call: bootstrap_app
      args:
        persisted_feed_configuration: {feed_url: ""}
        persisted_library_snapshot: null
        persisted_playback_progress: []
    then:
      - returns.feed_configuration.feed_url == ""
      - returns.library_sync_state.phase == "Idle"
      - returns.account_session.is_signed_in == false
      - returns.videos is non-empty array
  - id: bootstrap_with_cached_snapshot_restores_local_library
    description: App startup restores the cached synced library when the saved feed URL matches the persisted snapshot.
    when:
      call: bootstrap_app
      args:
        persisted_feed_configuration: {feed_url: "https://example.com/premium.xml"}
        persisted_library_snapshot:
          feed_url: "https://example.com/premium.xml"
          videos:
            - id: "video-1"
              title: "Cached premium video"
              description: "Cached description"
              is_premium: true
              feed_category: "Premium"
          last_successful_sync_summary: "Premium feed sync loaded 1 items."
        persisted_playback_progress: []
    then:
      - returns.library_sync_state.phase == "Success"
      - returns.account_session.is_signed_in == true
      - returns.videos[0].id == "video-1"
  - id: auth_surface_requires_feed_before_sync
    description: Auth surface remains in setup-required state until a copied feed URL is present.
    when:
      surface: auth
      state:
        feed_configuration: {feed_url: ""}
        account_session: {is_signed_in: false, notes: "Paste a Giant Bomb Premium RSS URL copied from the feeds page to replace the seeded library."}
        library_sync_state: {phase: "Idle", message: "Paste a Giant Bomb Premium RSS URL copied from the feeds page to replace the seeded library."}
    then:
      - visible status label == "Setup required"
      - primary sync action is disabled
      - clear synced data action is hidden
  - id: saved_feed_without_successful_sync_is_ready
    description: Once a copied feed URL is saved, Auth moves to a ready state even before the first successful sync.
    when:
      surface: auth
      state:
        feed_configuration: {feed_url: "https://example.com/premium.xml"}
        account_session: {is_signed_in: false, notes: "Saved feed URL detected. Sync once to seed the library, then background refresh will keep it current."}
        library_sync_state: {phase: "Idle", message: "Saved feed URL detected. Sync once to seed the library, then background refresh will keep it current."}
    then:
      - visible status label == "Ready"
      - primary sync action is enabled
      - primary sync action label == "Sync Premium feed"
  - id: synced_auth_state_relabels_primary_action_and_shows_clear_action
    description: After a successful sync, Auth shows a synced state, exposes clear-synced-data, and relabels the primary sync action for repeat use.
    when:
      surface: auth
      state:
        feed_configuration: {feed_url: "https://example.com/premium.xml"}
        account_session: {is_signed_in: true, account_label: "Copied Premium feed", notes: "Using copied Giant Bomb Premium feed URL."}
        library_sync_state: {phase: "Success", message: "Synced 42 Premium videos. Last refresh completed successfully.", last_successful_sync_summary: "42 videos • 12 shows"}
    then:
      - visible status label == "Synced"
      - primary sync action label == "Re-sync Premium library"
      - clear synced data action is visible
  - id: syncing_auth_state_disables_mutating_actions
    description: While a sync is active, Auth indicates syncing and prevents conflicting actions.
    when:
      surface: auth
      state:
        feed_configuration: {feed_url: "https://example.com/premium.xml"}
        account_session: {is_signed_in: false, notes: "Refreshing feed."}
        library_sync_state: {phase: "Refreshing", message: "Syncing the configured Premium feed URL..."}
    then:
      - visible status label == "Syncing"
      - primary sync action is disabled
      - clear synced data action is hidden or disabled
  - id: sync_success_replaces_library_and_marks_session_synced
    description: A successful feed sync replaces the active library and marks the session as synced.
    when:
      call: sync_premium_feed
      args:
        request:
          feed_url: "https://example.com/premium.xml"
          method: "GET"
          accept_header: "application/rss+xml, application/xml, text/xml"
          user_agent: "LookTube/0.2 feed sync"
    then:
      - returns.library_sync_state.phase == "Success"
      - returns.videos is non-empty array
      - returns.persisted_library_snapshot.feed_url == "https://example.com/premium.xml"
  - id: sync_failure_surfaces_error_state
    description: Feed sync failures produce a visible error state instead of crashing the app.
    when:
      call: sync_premium_feed
      args:
        request:
          feed_url: "https://example.com/failing-premium.xml"
          method: "GET"
          accept_header: "application/rss+xml, application/xml, text/xml"
          user_agent: "LookTube/0.2 feed sync"
    then:
      - returns.library_sync_state.phase == "Error"
      - returns.library_sync_state.message contains "Feed sync failed"
  - id: successful_empty_feed_is_treated_as_error
    description: A technically successful feed request that yields zero video items still results in an error state because the library would be unusable.
    when:
      call: sync_premium_feed
      args:
        request:
          feed_url: "https://example.com/empty-premium.xml"
          method: "GET"
          accept_header: "application/rss+xml, application/xml, text/xml"
          user_agent: "LookTube/0.2 feed sync"
    then:
      - returns.library_sync_state.phase == "Error"
      - returns.library_sync_state.message contains "returned no video items"
  - id: clear_synced_data_preserves_saved_feed_url
    description: Clearing synced data removes cached library, progress, and engagement state but keeps the saved feed URL for later re-sync.
    when:
      call: clear_synced_data
      args: {}
    then:
      - returns.feed_configuration.feed_url is string
      - returns.library_sync_state.phase == "Idle"
      - returns.library_sync_state.message contains "Saved feed URL"
  - id: notification_permission_requested_after_feed_saved
    description: On OS versions that gate notifications behind runtime permission, the app requests permission once a non-blank feed URL is saved and permission is not already granted.
    when:
      surface: auth
      state:
        feed_configuration: {feed_url: "https://example.com/premium.xml"}
        notification_permission: denied
        platform_supports_runtime_notification_permission: true
    then:
      - app requests notification permission
      - request is not repeated continuously within the same remembered UI session
  - id: notification_permission_not_requested_before_feed_saved
    description: Notification permission is not prompted before the user has saved any feed URL.
    when:
      surface: auth
      state:
        feed_configuration: {feed_url: ""}
        notification_permission: denied
        platform_supports_runtime_notification_permission: true
    then:
      - app does not request notification permission
  - id: background_refresh_scheduled_while_feed_url_exists
    description: Saving a non-blank feed URL keeps periodic background refresh registered.
    when:
      call: update_feed_url
      args:
        feed_url: "https://example.com/premium.xml"
    then:
      - background process "library_refresh" is registered
  - id: background_refresh_canceled_when_feed_url_cleared
    description: Clearing the saved feed URL removes periodic background refresh registration.
    when:
      call: update_feed_url
      args:
        feed_url: ""
    then:
      - background process "library_refresh" is absent
  - id: first_successful_sync_is_silent
    description: The first successful sync for a feed URL does not immediately post a new-release notification.
    when:
      process: library_refresh
      args:
        saved_feed_url: "https://example.com/premium.xml"
        previous_snapshot: null
    then:
      - returns.notification is absent
  - id: new_release_detection_uses_video_ids_for_same_feed
    description: New-release detection compares latest and previous snapshots for the same feed URL and treats previously unseen video IDs as new videos.
    when:
      process: library_refresh
      args:
        saved_feed_url: "https://example.com/premium.xml"
        previous_snapshot:
          feed_url: "https://example.com/premium.xml"
          videos:
            - id: "video-1"
              title: "Older item"
              description: ""
              is_premium: true
              feed_category: "Premium"
    then:
      - if latest snapshot contains "video-2" and not "video-1" only, returns.notification.latest_video_id == "video-2"
  - id: feed_switches_do_not_generate_false_positive_notifications
    description: Switching to a different feed URL does not treat the first snapshot from the new feed as a new-release notification event.
    when:
      process: library_refresh
      args:
        saved_feed_url: "https://example.com/other-premium.xml"
        previous_snapshot:
          feed_url: "https://example.com/premium.xml"
          videos:
            - id: "video-1"
              title: "Older item"
              description: ""
              is_premium: true
              feed_category: "Premium"
    then:
      - returns.notification is absent
  - id: repeated_new_release_detections_create_distinct_notifications
    description: Each later successful detection of a newly discovered latest video results in a distinct local notification entry rather than silently overwriting the previous one.
    when:
      process: notification_delivery
      args:
        latest_video:
          id: "video-2"
          title: "Second item"
          description: ""
          is_premium: true
          feed_category: "Premium"
        discovered_count: 1
    then:
      - if one run discovers latest_video_id "video-2" and a later run discovers latest_video_id "video-3", the resulting notification records are distinct
  - id: notification_channel_and_tap_behavior_are_stable
    description: New-release notifications use a stable library-update channel and tap into the player route.
    when:
      process: notification_delivery
      args:
        latest_video:
          id: "video-9"
          title: "Latest item"
          description: ""
          is_premium: true
          feed_category: "Premium"
        discovered_count: 2
    then:
      - returns.notification.channel_id == "looktube.library.updates"
      - returns.notification.action contains "opens player page"
  - id: notification_tap_routes_to_player
    description: Tapping a library-update notification opens the Player page and selects the newest discovered video.
    when:
      call: handle_launch_intent
      args:
        intent:
          open_video_id: "video-9"
          target_page: 2
    then:
      - returns.selected_video_id == "video-9"
      - returns.target_page == 2
  - id: launch_intent_can_navigate_without_preselecting_video
    description: App shell launch contracts may target a page even without selecting a specific video.
    when:
      call: handle_launch_intent
      args:
        intent:
          target_page: 1
    then:
      - returns.target_page == 1
  - id: library_empty_state_prompts_auth_sync
    description: Library surface tells the user to sync from Auth when no synced videos are available.
    when:
      surface: library
      state:
        videos: []
        library_sync_state: {phase: "Idle", message: "Paste a Giant Bomb Premium RSS URL copied from the feeds page to replace the seeded library."}
    then:
      - visible empty-state copy contains "Sync your Premium feed on Auth"
  - id: library_default_controls_are_show_latest_with_filters_collapsed
    description: Library browsing defaults to show grouping, latest sorting, and collapsed show filters.
    when:
      surface: library
      state:
        browse_state:
          grouping_mode: "show"
          sort_mode: "latest"
          selected_show_filter: "All shows"
          show_filters_expanded: false
          collapsed_group_keys: []
    then:
      - visible grouping mode == "Show"
      - visible sort mode == "Latest"
      - visible show-filters control indicates collapsed by default
  - id: library_supports_multiple_grouping_modes
    description: Library can regroup the same synced videos by show, cast, topic, or not grouped.
    when:
      surface: library
      action:
        set grouping_mode to one of [none, show, cast, topic]
    then:
      - visible library organization changes to reflect the chosen grouping mode
  - id: grouped_library_headers_toggle_section_visibility
    description: Grouped browsing lets the user collapse one section without changing the rest of the library state.
    when:
      surface: library
      state:
        browse_state:
          grouping_mode: "show"
          sort_mode: "latest"
          selected_show_filter: "All shows"
          show_filters_expanded: false
          collapsed_group_keys: []
        grouped_sections_exist: true
      action:
        collapse one visible group header
    then:
      - the collapsed section's episode cards are hidden
      - other section headers and their expansion state remain unchanged
      - jump rail targets continue to reflect the visible section anchors
  - id: grouped_library_supports_expand_all_and_collapse_all
    description: Grouped browsing exposes overview controls to expand all groups or collapse all groups in one step.
    when:
      surface: library
      state:
        browse_state:
          grouping_mode: "cast"
          sort_mode: "latest"
          selected_show_filter: "All shows"
          show_filters_expanded: false
          collapsed_group_keys: []
        grouped_sections_exist: true
      action:
        activate the expand-all or collapse-all group control
    then:
      - all visible groups share the requested expanded state
  - id: latest_and_oldest_sorts_are_global_not_implicit_show_groups
    description: Latest and oldest sorting behave as global chronological sorts instead of silently regrouping flat lists by show.
    when:
      surface: library
      action:
        set sort_mode to "latest" or "oldest"
    then:
      - flat-list ordering is determined by chronological sort and tie-break rules, not by implicit show grouping
  - id: grouped_library_sort_follows_selected_sort_mode_for_sections_and_episodes
    description: Grouped browsing applies the chosen sort mode both to group ordering and to episode ordering within each visible group.
    when:
      surface: library
      state:
        grouped_sections_exist: true
      action:
        set sort_mode to one of [latest, show, oldest]
    then:
      - visible section order follows the selected sort mode
      - visible episode order within each section follows the selected sort mode
  - id: library_show_filter_can_be_expanded_and_applied
    description: Show filtering stays collapsed by default but can be expanded and used to narrow the visible library.
    when:
      surface: library
      action:
        expand show filters and choose a non-default show filter
    then:
      - visible filtered count becomes narrower than the total count when matching items exist
      - active filter summary identifies the chosen show
  - id: library_jump_rail_includes_top_and_section_targets
    description: Grouped browsing exposes a right-side jump rail that always includes a top target and section targets for grouped results.
    when:
      surface: library
      state:
        browse_state:
          grouping_mode: "show"
          sort_mode: "latest"
          selected_show_filter: "All shows"
          show_filters_expanded: false
          collapsed_group_keys: []
        grouped_sections_exist: true
    then:
      - jump rail contains target "Top"
      - jump rail contains at least one section target
  - id: library_overview_panel_stays_above_scrolling_results
    description: Library status and browsing controls remain in an overview panel above the scrolling episode list, can scroll away before the results take over the viewport, and the jump rail anchors only to the episode-list panel.
    when:
      surface: library
      state:
        videos is non-empty array
        grouped_sections_exist: true
    then:
      - library status and browsing controls remain above the scrolling results panel until scrolled away
      - jump rail does not overlap the fixed overview panel
  - id: library_video_cards_show_resume_progress_when_available
    description: Library cards display resume context when saved playback progress exists for a video.
    when:
      surface: library
      state:
        videos:
          - id: "video-12"
            title: "Playable item"
            description: "Long description"
            is_premium: true
            feed_category: "Premium"
            playback_url: "https://video.example.com/video-12.mp4"
        playback_progress:
          "video-12":
            video_id: "video-12"
            position_seconds: 300
            duration_seconds: 1800
    then:
      - visible card copy contains "Resume"
      - visible card shows a progress indicator
  - id: library_completion_and_points_are_visible_without_show_score_bonus
    description: Library overview and show-group browsing expose watched/completion progress, but only watched videos affect the numeric Look Points score.
    when:
      surface: library
      state:
        look_points_summary:
          total_points: 30
          watched_video_count: 3
          total_video_count: 10
          completed_show_count: 1
          total_show_count: 4
          video_points: 30
        grouped_by_show: true
    then:
      - visible library summary contains "Look Points"
      - visible grouped show copy can indicate a show is complete
      - no visible score copy implies an extra show-completion bonus
  - id: library_video_cards_allow_manual_watch_updates
    description: Library cards expose explicit watched or unwatched actions in addition to passive progress display.
    when:
      surface: library
      state:
        videos:
          - id: "video-12"
            title: "Playable item"
            description: "Long description"
            is_premium: true
            feed_category: "Premium"
            playback_url: "https://video.example.com/video-12.mp4"
    then:
      - visible card copy contains either "Mark watched" or "Reset unwatched"
  - id: library_truncated_descriptions_can_expand_to_dialog
    description: Truncated library descriptions expose a details affordance and a dismissible dialog.
    when:
      surface: library
      action:
        open "More…" on a video card with overflowed description text
    then:
      - a details dialog appears
      - dialog can be dismissed by outside tap or by scrolling the list
  - id: selecting_library_video_opens_player
    description: Selecting a library video moves the app to the Player surface with that video selected.
    when:
      call: select_video
      args:
        video_id: "video-7"
    then:
      - returns.target_page == 2
  - id: player_empty_state_is_clear
    description: Player surface shows a clear empty-state message when no video is selected.
    when:
      surface: player
      state:
        selected_video: null
    then:
      - visible status title == "Nothing queued yet"
  - id: player_unavailable_state_handles_missing_playback_url
    description: Selecting a synced video with no playable URL produces an unavailable state instead of a crash.
    when:
      surface: player
      state:
        selected_video:
          id: "video-8"
          title: "Broken item"
          description: ""
          is_premium: true
          feed_category: "Premium"
          playback_url: null
    then:
      - visible status title == "Playback unavailable"
  - id: player_preparing_state_is_visible_until_controller_ready
    description: When a playable item is selected before the shared player controller is ready, the player surface shows a preparing state.
    when:
      surface: player
      state:
        selected_video:
          id: "video-9"
          title: "Playable item"
          description: ""
          is_premium: true
          feed_category: "Premium"
          playback_url: "https://video.example.com/video-9.mp4"
        player_ready: false
    then:
      - visible status title == "Preparing player"
  - id: player_surface_keeps_video_frame_above_details
    description: When a video is selected, the player frame remains visible above the compact supporting copy and metadata.
    when:
      surface: player
      state:
        selected_video:
          id: "video-9"
          title: "Playable item"
          description: ""
          is_premium: true
          feed_category: "Premium"
          playback_url: "https://video.example.com/video-9.mp4"
        player_ready: true
        player_presentation_state:
          selected_video_id: "video-9"
          is_fullscreen: false
          player_ready: true
          cast_action_visible: true
          player_frame_pinned_top: true
          remote_playback_active: false
    then:
      - the video frame is visible before the supporting copy and metadata card
  - id: player_resume_uses_saved_progress
    description: When saved progress exists, playback seeks near the stored position before auto-playing.
    when:
      surface: player
      state:
        selected_video:
          id: "video-9"
          title: "Playable item"
          description: ""
          is_premium: true
          feed_category: "Premium"
          playback_url: "https://video.example.com/video-9.mp4"
        playback_progress:
          video_id: "video-9"
          position_seconds: 1250
          duration_seconds: 4200
    then:
      - playback begins near 1250 seconds
  - id: player_remote_playback_state_is_explained
    description: Remote playback shows explicit cast status copy instead of leaving the player surface as an unexplained black frame.
    when:
      surface: player
      state:
        selected_video:
          id: "video-10"
          title: "Castable item"
          description: ""
          is_premium: true
          feed_category: "Premium"
          playback_url: "https://video.example.com/video-10.mp4"
        player_presentation_state:
          selected_video_id: "video-10"
          is_fullscreen: false
          player_ready: true
          cast_action_visible: true
          player_frame_pinned_top: true
          remote_playback_active: true
          remote_playback_label: "Casting to Living Room TV"
    then:
      - visible player status contains "Casting to Living Room TV"
      - visible player status explains that standard player controls can pause, resume, or stop casting
      - remote playback indicator is visual-only and does not block interaction with the player surface
  - id: player_reselection_and_cast_recovery_restore_playback
    description: Re-selecting the active video, reconnecting to an already-active cast session, or losing a cast session must keep playback recoverable without black screens or unnecessary cast restarts.
    when:
      surface: player
      state:
        selected_video:
          id: "video-11"
          title: "Recoverable item"
          description: ""
          is_premium: true
          feed_category: "Premium"
          playback_url: "https://video.example.com/video-11.mp4"
        previous_playback_target_id: "video-11"
        local_player_state: "idle or ended after cast handoff loss"
      action:
        explicitly select the same video again or reopen the app to the same target
    then:
      - local playback is reinitialized for the selected video
      - reconnecting to an already-active cast session does not needlessly reload the same remote item
      - player does not remain stuck on an unexplained black surface
  - id: player_supports_fullscreen_toggle_and_landscape_behavior
    description: Player supports fullscreen from controls and landscape, while double taps on the left or right side seek backward or forward during playback.
    when:
      surface: player
      action:
        use the fullscreen control, rotate device to landscape, or double tap the left or right side of the player during active playback
    then:
      - player enters fullscreen presentation
      - double tapping the left side seeks backward
      - double tapping the right side seeks forward
      - leaving fullscreen restores the standard shell presentation
  - id: player_fullscreen_rotation_keeps_active_item
    description: Entering or leaving fullscreen by rotation keeps the current video active and does not rewind or switch back to a previously played item.
    when:
      surface: player
      state:
        selected_video:
          id: "video-15"
          title: "Stable fullscreen item"
          description: ""
          is_premium: true
          feed_category: "Premium"
          playback_url: "https://video.example.com/video-15.mp4"
      action:
