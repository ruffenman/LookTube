          total_points: 20
          watched_video_count: 2
          total_video_count: 10
          completed_show_count: 0
          total_show_count: 4
          video_points: 20
    then:
      - visible player copy contains "Recent plays"
      - visible player copy contains either "Mark watched" or "Reset unwatched"
      - active player surface does not rely on a separate playback-details card for resume/help text
  - id: cast_support_failure_does_not_block_local_playback
    description: Failure to initialize cast support does not prevent local playback from being available.
    when:
      surface: player
      state:
        cast_initialization_failed: true
        selected_video:
          id: "video-14"
          title: "Local fallback item"
          description: ""
          is_premium: true
          feed_category: "Premium"
          playback_url: "https://video.example.com/video-14.mp4"
    then:
      - local playback remains available
  - id: playback_progress_persists_during_and_after_playback
    description: Playback progress is stored frequently during playback and also on pauses, item transitions, and service teardown.
    when:
      call: persist_playback_progress
      args:
        video_id: "video-11"
        position_seconds: 300
        duration_seconds: 1800
    then:
      - returns.playback_progress.video_id == "video-11"
      - returns.playback_progress.position_seconds == 300
  - id: feed_sync_requests_use_expected_headers_without_auth_replay
    description: Feed sync uses a direct request to the copied feed URL with stable headers and without browser automation, cookies, or explicit authorization headers.
    when:
      call: sync_premium_feed
      args:
        request:
          feed_url: "https://example.com/premium.xml"
          method: "GET"
          accept_header: "application/rss+xml, application/xml, text/xml"
          user_agent: "LookTube/0.2 feed sync"
    then:
      - request.method == "GET"
      - request.accept_header == "application/rss+xml, application/xml, text/xml"
      - request.user_agent == "LookTube/0.2 feed sync"
      - request.authorization_header is absent
      - request.cookie_header is absent
  - id: feed_parser_prefers_media_content_then_enclosure_then_link
    description: Parser chooses the first available playable target in a stable priority order.
    when:
      call: parse_rss_feed
      args:
        rss_xml: item has media:content, enclosure, and link candidates
    then:
      - returns.videos[0].playback_url resolves from media:content first
      - if media:content is absent, playback_url resolves from enclosure
      - if both are absent, playback_url resolves from link
  - id: parser_infers_show_titles_and_thumbnails_heuristically
    description: Generic feed categories still produce useful show titles and thumbnails using item title, page link, and description heuristics.
    when:
      call: parse_rss_feed
      args:
        rss_xml: item has generic category and title similar to "Quick Look: Future Cop L.A.P.D."
    then:
      - returns.videos[0].series_title == "Quick Look"
      - returns.videos[0].thumbnail_url may come from the first image in description HTML
  - id: parser_parses_pubdate_or_dcdate_and_duration_variants
    description: Parser accepts multiple date and duration fields commonly found in feed items.
    when:
      call: parse_rss_feed
      args:
        rss_xml: items use pubDate or dc:date and duration from media:content@duration or itunes:duration
    then:
      - published_at_epoch_millis is populated when either supported date field exists
      - duration_seconds is populated when either supported duration field exists
  - id: parser_canonicalizes_bombcast_episode_titles
    description: Bombcast episode numbering does not pollute the inferred show title.
    when:
      call: parse_rss_feed
      args:
        rss_xml: item title is "Giant Bombcast 901: Handheld Hot Takes"
    then:
      - returns.videos[0].series_title == "Giant Bombcast"
  - id: parser_infers_show_from_giant_bomb_page_slug
    description: When a title is too ambiguous, the page URL slug can still reveal the show identity.
    when:
      call: parse_rss_feed
      args:
        rss_xml: item title is numeric but link contains slug "giant-bombcast"
    then:
      - returns.videos[0].series_title == "Giant Bombcast"
  - id: parser_canonicalizes_upf_abbreviation
    description: UPF titles normalize to the full show name for grouping and display.
    when:
      call: parse_rss_feed
      args:
        rss_xml: item title begins with "UPF"
    then:
      - returns.videos[0].series_title == "Unprofessional Fridays"
  - id: parser_maps_bonus_dump_titles_to_voicemail_dump_truck
    description: Bonus dump style titles resolve to the voicemail show family instead of fragmenting into separate shows.
    when:
      call: parse_rss_feed
      args:
        rss_xml: item title includes "BONUS DUMP" and category is generic premium
    then:
      - returns.videos[0].series_title == "Voicemail Dump Truck"
  - id: feed_url_persistence_prefers_secure_storage_and_migrates_legacy_data
    description: Saved feed URLs use platform secure storage when available and migrate legacy plaintext values into the secure payload on read.
    when:
      call: update_feed_url
      args:
        feed_url: "https://example.com/premium.xml?token=secret"
    then:
      - persisted feed URL is protected at rest when secure storage is available
      - legacy plaintext storage may be used only as fallback for the feed URL itself

constraints:
  product_boundary:
    - copied Giant Bomb Premium feed URL is the only supported user-facing sync input
    - implementation must not require browser automation, cookie harvesting, or unsupported website sign-in replay
    - no server-push notification backend is required; new-release notifications come from local background refresh diffs
  security:
    - if feed URL is persisted, secure platform storage must be used when available
    - live feed URLs, cookies, and raw authenticated feed payloads must not be committed as fixtures or examples
    - feed sync and playback flows must not log secret-bearing feed URLs verbatim in normal operation
  compatibility:
    - implementation must preserve the three top-level surfaces: Auth, Library, and Player
    - implementation must preserve the launch-intent behavior for opening the Player page and optionally preselecting a video
    - parser must accept RSS item shapes that expose playback targets through media:content, enclosure, or link
    - app must remain usable before the first successful live feed sync
  reliability:
    - background refresh remains registered while a non-blank saved feed URL exists
    - background refresh registration uses one unique periodic work identity
    - background refresh scheduling uses a 15 minute interval with a 5 minute flex window
    - background refresh requires connected network and battery-not-low conditions
    - initial successful sync for a feed URL stays silent
    - later successful detections of newly discovered video IDs must be able to surface as distinct visible notifications
    - background refresh may retry transient failures up to three attempts before giving up
  operational:
    - direct feed requests must use finite network timeouts instead of hanging indefinitely
    - playback progress persistence should be frequent enough that normal resume loss stays within a few seconds
    - local playback must remain available even if cast support initialization fails
    - if a cast session ends or becomes unavailable, the last known item and position must remain recoverable for local playback
