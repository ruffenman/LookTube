name: Release signed APKs

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing release tag to build and publish, for example v0.1.2
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, sign, and publish release
    runs-on: ubuntu-latest
    environment: release
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      LOOKTUBE_RELEASE_KEYSTORE_B64: ${{ secrets.LOOKTUBE_RELEASE_KEYSTORE_B64 }}
      LOOKTUBE_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.LOOKTUBE_RELEASE_KEYSTORE_PASSWORD }}
      LOOKTUBE_RELEASE_KEY_PASSWORD: ${{ secrets.LOOKTUBE_RELEASE_KEY_PASSWORD }}
      LOOKTUBE_RELEASE_KEY_ALIAS: ${{ secrets.LOOKTUBE_RELEASE_KEY_ALIAS }}
    steps:
      - name: Check out workflow tooling
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check out release source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.ref }}
          path: release-src

      - name: Verify tag points to a commit on main
        shell: pwsh
        run: |
          $releaseSha = (git -C release-src rev-parse HEAD).Trim()
          $reachableFromMain = git branch -r --contains $releaseSha | Select-String 'origin/main'
          if (-not $reachableFromMain) {
              throw 'Release tags must point to a commit that is reachable from origin/main'
          }

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Make Gradle wrapper executable
        run: chmod +x release-src/gradlew

      - name: Verify release secrets are configured
        shell: pwsh
        run: |
          $missingSecrets = @()
          if ([string]::IsNullOrWhiteSpace($env:LOOKTUBE_RELEASE_KEYSTORE_B64)) {
              $missingSecrets += 'LOOKTUBE_RELEASE_KEYSTORE_B64'
          }
          if ([string]::IsNullOrWhiteSpace($env:LOOKTUBE_RELEASE_KEYSTORE_PASSWORD)) {
              $missingSecrets += 'LOOKTUBE_RELEASE_KEYSTORE_PASSWORD'
          }
          if ([string]::IsNullOrWhiteSpace($env:LOOKTUBE_RELEASE_KEY_ALIAS)) {
              $missingSecrets += 'LOOKTUBE_RELEASE_KEY_ALIAS'
          }

          if ($missingSecrets.Count -gt 0) {
              throw "Missing required GitHub Actions secrets: $($missingSecrets -join ', ')"
          }

      - name: Verify tag matches app version
        shell: pwsh
        run: |
          $tagName = if ("${{ github.event_name }}" -eq 'workflow_dispatch') {
              "${{ github.event.inputs.tag_name }}"
          } else {
              "${{ github.ref_name }}"
          }
          $tagVersion = $tagName.TrimStart('v')
          $versionMatch = Select-String -Path 'release-src/app/build.gradle.kts' -Pattern 'versionName\s*=\s*"([^"]+)"'
          $appVersion = $versionMatch.Matches | Select-Object -First 1 | ForEach-Object {
              $_.Groups[1].Value
          }

          if ([string]::IsNullOrWhiteSpace($appVersion)) {
              throw 'Unable to resolve versionName from release-src/app/build.gradle.kts'
          }
          if ($tagVersion -ne $appVersion) {
              throw "Tag version $tagVersion does not match app versionName $appVersion"
          }

          "LOOKTUBE_TAG_NAME=$tagName" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "LOOKTUBE_VERSION=$tagVersion" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Decode signing keystore
        shell: pwsh
        run: |
          $keystorePath = Join-Path $env:RUNNER_TEMP 'looktube-release.jks'
          [IO.File]::WriteAllBytes(
              $keystorePath,
              [Convert]::FromBase64String($env:LOOKTUBE_RELEASE_KEYSTORE_B64)
          )
          "LOOKTUBE_RELEASE_KEYSTORE_PATH=$keystorePath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Prepare staged release assets directory
        shell: pwsh
        run: |
          $assetDir = Join-Path $env:RUNNER_TEMP 'looktube-release-assets'
          New-Item -ItemType Directory -Force -Path $assetDir | Out-Null
          "LOOKTUBE_RELEASE_ASSETS_DIR=$assetDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build and sign release APKs
        shell: pwsh
        run: |
          pushd release-src
          ./gradlew :app:assembleBaselineRelease -PlooktubeBaselineReleaseAbi=arm64-v8a
          popd
          pwsh -NoLogo -File ./scripts/Sign-ReleaseApk.ps1 `
            -Flavor baseline `
            -RepoRoot (Join-Path $PWD 'release-src') `
            -KeystorePath $env:LOOKTUBE_RELEASE_KEYSTORE_PATH `
            -KeyAlias $env:LOOKTUBE_RELEASE_KEY_ALIAS `
            -VersionName $env:LOOKTUBE_VERSION `
            -OutputApkPath (Join-Path $env:LOOKTUBE_RELEASE_ASSETS_DIR "LookTube-Baseline-arm64-v8a-$env:LOOKTUBE_VERSION.apk")

          pushd release-src
          ./gradlew :app:assembleBaselineRelease -PlooktubeBaselineReleaseAbi=x86_64
          popd
          pwsh -NoLogo -File ./scripts/Sign-ReleaseApk.ps1 `
            -Flavor baseline `
            -RepoRoot (Join-Path $PWD 'release-src') `
            -KeystorePath $env:LOOKTUBE_RELEASE_KEYSTORE_PATH `
            -KeyAlias $env:LOOKTUBE_RELEASE_KEY_ALIAS `
            -VersionName $env:LOOKTUBE_VERSION `
            -OutputApkPath (Join-Path $env:LOOKTUBE_RELEASE_ASSETS_DIR "LookTube-Baseline-x86_64-$env:LOOKTUBE_VERSION.apk")

          pushd release-src
          ./gradlew :app:assembleHighspecRelease
          popd
          pwsh -NoLogo -File ./scripts/Sign-ReleaseApk.ps1 `
            -Flavor highspec `
            -RepoRoot (Join-Path $PWD 'release-src') `
            -KeystorePath $env:LOOKTUBE_RELEASE_KEYSTORE_PATH `
            -KeyAlias $env:LOOKTUBE_RELEASE_KEY_ALIAS `
            -VersionName $env:LOOKTUBE_VERSION `
            -OutputApkPath (Join-Path $env:LOOKTUBE_RELEASE_ASSETS_DIR "LookTube-Highspec-arm64-v8a-$env:LOOKTUBE_VERSION.apk")

      - name: Prepare release notes
        shell: pwsh
        run: |
          $currentVersion = [version]$env:LOOKTUBE_VERSION
          $semverTags = git -C release-src tag --list 'v*.*.*' | ForEach-Object {
              $tag = $_.Trim()
              if ([string]::IsNullOrWhiteSpace($tag)) {
                  return
              }

              try {
                  [pscustomobject]@{
                      Tag = $tag
                      Version = [version]$tag.TrimStart('v')
                  }
              } catch {
                  return
              }
          }
          $previousTag = $semverTags |
              Where-Object { $_.Version -lt $currentVersion } |
              Sort-Object Version -Descending |
              Select-Object -First 1 -ExpandProperty Tag
          $repositoryUrl = "https://github.com/$env:GITHUB_REPOSITORY"
          $compareUrl = if ([string]::IsNullOrWhiteSpace($previousTag)) {
              $null
          } else {
              "$repositoryUrl/compare/$previousTag...$env:LOOKTUBE_TAG_NAME"
          }
          $commitLog = if ([string]::IsNullOrWhiteSpace($previousTag)) {
              git -C release-src log --no-merges --pretty=format:'- %s' -n 8 $env:LOOKTUBE_TAG_NAME
          } else {
              git -C release-src log --no-merges --pretty=format:'- %s' "$previousTag..$env:LOOKTUBE_TAG_NAME"
          }
          if ([string]::IsNullOrWhiteSpace(($commitLog | Out-String).Trim())) {
              $commitLog = '- Maintenance release.'
          }
          $compareSection = if ([string]::IsNullOrWhiteSpace($compareUrl)) {
              'Commit range: Initial tagged release for LookTube.'
          } else {
              "Commit range: [$previousTag...$env:LOOKTUBE_TAG_NAME]($compareUrl)"
          }
          $releaseNotesPath = Join-Path $env:RUNNER_TEMP 'looktube-release-notes.txt'
          @"
          LookTube $env:LOOKTUBE_VERSION is a signed GitHub release build.

          ## Install guide
          - Most users should install `LookTube-Baseline-arm64-v8a-$env:LOOKTUBE_VERSION.apk`.
          - Use `LookTube-Baseline-x86_64-$env:LOOKTUBE_VERSION.apk` only for x86_64 emulators or uncommon x86_64 Android devices.
          - `LookTube-Highspec-arm64-v8a-$env:LOOKTUBE_VERSION.apk` is the optional higher-spec build for newer arm64 devices on Android 15+.
          - Verify the attached SHA-256 checksum file for the APK you choose before installing.

          ## Changes in this release
          $commitLog

          ## Notes
          - Baseline is the safest default when you are not sure which build to install.
          - Highspec remains optional and targets newer devices with the higher-spec local-caption stack.

          $compareSection
          "@ | Set-Content -Path $releaseNotesPath -Encoding utf8
          "LOOKTUBE_RELEASE_NOTES_PATH=$releaseNotesPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.LOOKTUBE_TAG_NAME }}
          name: LookTube ${{ env.LOOKTUBE_VERSION }}
          body_path: ${{ env.LOOKTUBE_RELEASE_NOTES_PATH }}
          fail_on_unmatched_files: true
          files: |
            ${{ env.LOOKTUBE_RELEASE_ASSETS_DIR }}/LookTube-Baseline-*-${{ env.LOOKTUBE_VERSION }}.apk
            ${{ env.LOOKTUBE_RELEASE_ASSETS_DIR }}/LookTube-Baseline-*-${{ env.LOOKTUBE_VERSION }}.apk.sha256
            ${{ env.LOOKTUBE_RELEASE_ASSETS_DIR }}/LookTube-Highspec-*-${{ env.LOOKTUBE_VERSION }}.apk
            ${{ env.LOOKTUBE_RELEASE_ASSETS_DIR }}/LookTube-Highspec-*-${{ env.LOOKTUBE_VERSION }}.apk.sha256

      - name: Remove temporary signing keystore
        if: always()
        shell: pwsh
        run: |
          if (-not [string]::IsNullOrWhiteSpace($env:LOOKTUBE_RELEASE_KEYSTORE_PATH) -and (Test-Path $env:LOOKTUBE_RELEASE_KEYSTORE_PATH)) {
              Remove-Item $env:LOOKTUBE_RELEASE_KEYSTORE_PATH -Force
          }
